      }

      function GraphViewerPage(props) {
        const project = props.project;
        const onLogout = props.onLogout;
        const onBack = props.onBack;
        const [graphView, setGraphView] = React.useState("MetaGraph");
        const buildCypher = (view) => {
          const pf = project ? ", project:'" + project.replace(/'/g, "") + "'" : "";
          if (view === "MetaGraph") {
            return (
              "MATCH (r:Rule {graph:'Metagraph'" + pf + "}) " +
              "OPTIONAL MATCH (r)-[hb:HAS_BODY]->(ab:Atom {graph:'Metagraph'" + pf + "}) " +
              "OPTIONAL MATCH (r)-[hh:HAS_HEAD]->(ah:Atom {graph:'Metagraph'" + pf + "}) " +
              "OPTIONAL MATCH (ab)-[ref1:REFERS_TO]->(x1) " +
              "OPTIONAL MATCH (ah)-[ref2:REFERS_TO]->(x2) " +
              "OPTIONAL MATCH (ab)-[arg1:ARG]->(v1) " +
              "OPTIONAL MATCH (ah)-[arg2:ARG]->(v2) " +
              "RETURN r,hb,ab,hh,ah,ref1,x1,ref2,x2,arg1,v1,arg2,v2 " +
              "UNION " +
              "MATCH (n {graph:'Metagraph'" + pf + "}) " +
              "WHERE (n:Var OR n:Literal) AND NOT (n)<-[:ARG]-() " +
              "RETURN n AS r, null AS hb, null AS ab, null AS hh, null AS ah, null AS ref1, null AS x1, null AS ref2, null AS x2, null AS arg1, null AS v1, null AS arg2, null AS v2"
            );
          }
          return (
            "MATCH (c:Class {graph:'OntoGraph'" + pf + "}) " +
            "OPTIONAL MATCH (c)-[hp:HAS_DATA_PROPERTY|HAS_OBJECT_PROPERTY]->(p {graph:'OntoGraph'" + pf + "}) " +
            "RETURN c,hp,p"
          );
        };
        const [cypher, setCypher] = React.useState(buildCypher("MetaGraph"));
        const [mode, setMode] = React.useState("ingest");
        const [promptText, setPromptText] = React.useState("");
        const [editRuleId, setEditRuleId] = React.useState("");
        const [existingRules, setExistingRules] = React.useState([]);
        const [loadingRules, setLoadingRules] = React.useState(false);
        const [isCypherPrompt, setIsCypherPrompt] = React.useState(false);
        const [responseText, setResponseText] = React.useState("");
        const [responseCypher, setResponseCypher] = React.useState("");
        const [status, setStatus] = React.useState("Ready");
        const [isRunning, setIsRunning] = React.useState(false);
        const [selected, setSelected] = React.useState(null);
        const [editingKey, setEditingKey] = React.useState(null);
        const [editingValue, setEditingValue] = React.useState("");
        const [progress, setProgress] = React.useState(0);
        const [step, setStep] = React.useState(0);
        const [stepTimes, setStepTimes] = React.useState([]);
        const [tick, setTick] = React.useState(0);
        const [contextMenu, setContextMenu] = React.useState(null);
        const [isModeMenuOpen, setIsModeMenuOpen] = React.useState(false);
        const [speckleConfig, setSpeckleConfig] = React.useState({
          speckleProjectId: "",
          baseModelId: "",
          baseModelName: "",
          validationModelId: ""
        });
        const [speckleConfigStatus, setSpeckleConfigStatus] = React.useState("Load Speckle project mapping to enable the Model Viewer.");
        const [loadingSpeckleConfig, setLoadingSpeckleConfig] = React.useState(false);

        const vizRef = React.useRef(null);
        const stepRef = React.useRef(step);
        const stepStartedAtRef = React.useRef(null);
        const pollRef = React.useRef(null);
        const modeDropdownRef = React.useRef(null);

        const ingestSteps = [
          "Send rules",
          "LLM parse",
          "Write graph",
          "Annotate properties",
          "Reload graph"
        ];
        const querySteps = [
          "Send prompt",
          "Generate cypher",
          "Query graph",
          "Generate response",
          "Complete"
        ];
        const steps = mode === "query" ? querySteps : ingestSteps;

        React.useEffect(() => {
          stepRef.current = step;
        }, [step]);

        const fetchExistingRules = async () => {
          setLoadingRules(true);
          try {
            const result = await executeCypher(
              "MATCH (r:Rule) WHERE r.graph = 'Metagraph'" + (project ? " AND r.project = '" + project.replace(/'/g, "") + "'" : "") + " RETURN r.Rule_Id AS rule_id, coalesce(r.text, '') AS text, coalesce(r.kind, '') AS kind ORDER BY r.Rule_Id"
            );
            const rows = result?.results?.[0]?.data?.map(d => d.row) || [];
            setExistingRules(rows.map(r => ({ rule_id: r[0], text: r[1], kind: r[2] })));
          } catch (err) {
            setExistingRules([]);
          }
          setLoadingRules(false);
        };

        React.useEffect(() => {
          setProgress(0);
          setWorkflowStep(0);
          setStepTimes(Array(steps.length).fill(null));
          setStatus("Ready");
          setResponseText("");
          setResponseCypher("");
          setIsRunning(false);
          setEditRuleId("");
          if (mode === "edit") {
            fetchExistingRules();
          }
          if (pollRef.current) {
            clearTimeout(pollRef.current);
            pollRef.current = null;
          }
        }, [mode]);

        React.useEffect(() => {
          if (step <= 0) return;
          const id = setInterval(() => setTick((t) => t + 1), 200);
          return () => clearInterval(id);
        }, [step]);

        React.useEffect(() => {
          const handlePointerDown = (event) => {
            if (!modeDropdownRef.current) return;
            if (!modeDropdownRef.current.contains(event.target)) {
              setIsModeMenuOpen(false);
            }
          };
          document.addEventListener("mousedown", handlePointerDown);
          return () => document.removeEventListener("mousedown", handlePointerDown);
        }, []);

        const getDataServiceBaseUrl = () => {
          const cfg = window.GRAPH_CONFIG || {};
          return (cfg.dataServiceUrl || "/data-service").replace(/\/+$/, "");
        };

        const loadSpeckleConfig = async () => {
          if (!project) return;
          setLoadingSpeckleConfig(true);
          try {
            const response = await fetch(getDataServiceBaseUrl() + "/integration/speckle/project/" + encodeURIComponent(project));
            if (response.status === 404) {
              setSpeckleConfig({
                speckleProjectId: "",
                baseModelId: "",
                baseModelName: "",
                validationModelId: ""
              });
              setSpeckleConfigStatus("No Speckle model link saved for this DG project yet.");
              return;
            }
            if (!response.ok) {
              throw new Error(await response.text() || ("HTTP " + response.status));
            }
            const data = await response.json();
            setSpeckleConfig({
              speckleProjectId: data.speckleProjectId || "",
              baseModelId: data.baseModelId || "",
              baseModelName: data.baseModelName || "",
              validationModelId: data.validationModelId || ""
            });
            setSpeckleConfigStatus("Speckle model link loaded.");
          } catch (err) {
            setSpeckleConfigStatus("Failed to load Speckle config: " + err.message);
          } finally {
            setLoadingSpeckleConfig(false);
          }
        };

        const saveSpeckleConfig = async () => {
          if (!project) return;
          setLoadingSpeckleConfig(true);
          try {
            const response = await fetch(getDataServiceBaseUrl() + "/integration/speckle/project/" + encodeURIComponent(project), {
              method: "PUT",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                speckleProjectId: (speckleConfig.speckleProjectId || "").trim(),
                baseModelId: (speckleConfig.baseModelId || "").trim(),
                baseModelName: (speckleConfig.baseModelName || "").trim() || null,
                validationModelId: (speckleConfig.validationModelId || "").trim() || null
              })
            });
            const rawText = await response.text();
            let data = null;
            if (rawText) {
              try { data = JSON.parse(rawText); } catch (_) {}
            }
            if (!response.ok) {
              throw new Error(data?.detail || rawText || ("HTTP " + response.status));
            }
            setSpeckleConfig({
              speckleProjectId: data?.speckleProjectId || "",
              baseModelId: data?.baseModelId || "",
              baseModelName: data?.baseModelName || "",
              validationModelId: data?.validationModelId || ""
            });
            setSpeckleConfigStatus("Speckle model link saved.");
          } catch (err) {
            setSpeckleConfigStatus("Failed to save Speckle config: " + err.message);
          } finally {
            setLoadingSpeckleConfig(false);
          }
        };

        const openModelViewer = () => {
          const params = new URLSearchParams();
          params.set("project", project || "");
          window.location.href = "/model-viewer/?" + params.toString();
        };

        const roundSeconds = (ms) => Math.round((ms / 1000) * 10) / 10;

        const setWorkflowStep = (nextStep) => {
          const now = Date.now();
          const currentStep = stepRef.current;
          if (currentStep > 0 && stepStartedAtRef.current) {
            const elapsed = roundSeconds(now - stepStartedAtRef.current);
            setStepTimes((times) => {
              const next = times.length ? times.slice() : Array(steps.length).fill(null);
              next[currentStep - 1] = elapsed;
              return next;
            });
          }
          if (nextStep > 0) {
            stepStartedAtRef.current = now;
          } else {
            stepStartedAtRef.current = null;
          }
          stepRef.current = nextStep;
          setStep(nextStep);
        };

        const finalizeWorkflowStep = () => {
          const now = Date.now();
          const currentStep = stepRef.current;
          if (currentStep > 0 && stepStartedAtRef.current) {
            const elapsed = roundSeconds(now - stepStartedAtRef.current);
            setStepTimes((times) => {
              const next = times.length ? times.slice() : Array(steps.length).fill(null);
              next[currentStep - 1] = elapsed;
              return next;
            });
          }
          stepStartedAtRef.current = null;
        };

        const clearPoll = () => {
          if (pollRef.current) {
            clearTimeout(pollRef.current);
            pollRef.current = null;
          }
        };

        const normalizeBaseUrl = (base) => {
          if (!base) return "";
          return base.endsWith("/") ? base.slice(0, -1) : base;
        };

        const executeCypher = async (statement) => {
          const cfg = window.GRAPH_CONFIG || {};
          const url = (cfg.neo4jHttp || "/neo4j") + "/db/neo4j/tx/commit";
          const auth = btoa(`${cfg.neo4jUser}:${cfg.neo4jPassword}`);
          const body = { statements: [{ statement }] };
          const res = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json", "Authorization": "Basic " + auth },
            body: JSON.stringify(body)
          });
          const json = await res.json();
          if (!res.ok) {
            const msg = json?.errors?.[0]?.message || res.statusText || "Neo4j error";
            throw new Error(msg);
          }
          if (Array.isArray(json?.errors) && json.errors.length) {
            throw new Error(json.errors[0]?.message || "Neo4j error");
          }
          return json;
        };

        const formatCypherResult = (json) => {
          const rows = json?.results?.[0]?.data?.map((d) => d.row) || [];
          if (rows.length) return JSON.stringify(rows, null, 2);
          if (json?.results?.[0]?.data?.length) {
            return JSON.stringify(json.results[0].data, null, 2);
          }
          if (json?.errors?.length) return JSON.stringify(json.errors, null, 2);
          return JSON.stringify(json, null, 2);
        };

        const tagProjectNodes = async () => {
          if (!project) return;
          const safeProject = project.replace(/'/g, "");
          await executeCypher(
            "MATCH (n) WHERE n.project IS NULL OR n.project = 'default-project' SET n.project = '" + safeProject + "'"
          );
        };

        const applyProgressUpdate = (data, modeType) => {
          if (!data) return;
          const stepValue = Number(data.step ?? data.payload?.step);
          if (Number.isFinite(stepValue) && stepValue > 0 && stepValue <= steps.length && stepValue !== stepRef.current) {
            setWorkflowStep(stepValue);
          }
          const progressValue = data.progress ?? data.payload?.progress;
          if (typeof progressValue === "number" && Number.isFinite(progressValue)) {
            const clamped = Math.max(0, Math.min(100, progressValue));
            setProgress(clamped);
          }
          const message = data.message ?? data.payload?.message;
          if (typeof message === "string" && message.trim()) {
            setStatus(message);
          } else if (data.status === "running") {
            setStatus("Workflow running...");
          }
        };

        const startPollingResult = (executionId, modeType) => {
          const cfg = window.GRAPH_CONFIG || {};
          const base = normalizeBaseUrl(cfg.dataServiceUrl || "/data-service");
          const poll = async () => {
            try {
              const res = await fetch(`${base}/execution-result/${executionId}`);
              if (!res.ok) {
                setStatus(`Polling error: ${res.status}`);
              } else {
                const data = await res.json();
                const status = data?.status || "running";
                if (status !== "completed" && status !== "cancelled" && status !== "failed") {
                  applyProgressUpdate(data, modeType);
                }
                if (status === "completed") {
                  const payload = data?.payload || {};
                  if (modeType === "query") {
                    setResponseText(payload.answer || payload.response || "");
                    setResponseCypher(payload.cypher || "");
                  } else {
                    setResponseText("The Rule ingesting completed successfully");
                    const cypherValue = Array.isArray(payload.cypher)
                      ? payload.cypher.join("\n\n")
                      : (payload.cypher || "");
                    setResponseCypher(cypherValue);
                  }
                  clearPoll();
                  if (modeType !== "query") {
                    await tagProjectNodes();
                    await run(undefined, { silentStatus: true });
                    fetchExistingRules();
                  }
                  setWorkflowStep(5); setProgress(100);
                  setStatus("Workflow completed");
                  finalizeWorkflowStep();
                  setIsRunning(false);
                  return;
                }
                if (status === "cancelled") {
                  setStatus("Workflow cancelled");
                  finalizeWorkflowStep();
                  setIsRunning(false);
                  clearPoll();
                  return;
                }
                if (status === "failed") {
                  setStatus("Workflow failed");
                  setIsRunning(false);
                  clearPoll();
                  return;
                }
              }
            } catch (err) {
              setStatus("Polling failed: " + err.message);
            }
            pollRef.current = setTimeout(poll, 1500);
          };
          clearPoll();
          poll();
        };

        const startPollingLatest = (workflowKey, modeType) => {
          const cfg = window.GRAPH_CONFIG || {};
          const base = normalizeBaseUrl(cfg.dataServiceUrl || "/data-service");
          const poll = async () => {
            try {
              const res = await fetch(`${base}/execution-result/latest/${workflowKey}`);
              if (!res.ok) {
                setStatus(`Polling error: ${res.status}`);
              } else {
                const data = await res.json();
                const status = data?.status || "running";
                if (status !== "completed" && status !== "cancelled" && status !== "failed") {
                  applyProgressUpdate(data, modeType);
                }
                if (status === "completed") {
                  const payload = data?.payload || {};
                  if (modeType === "query") {
                    setResponseText(payload.answer || payload.response || "");
                    setResponseCypher(payload.cypher || "");
                  } else {
                    setResponseText("The Rule ingesting completed successfully");
                    const cypherValue = Array.isArray(payload.cypher)
                      ? payload.cypher.join("\n\n")
                      : (payload.cypher || "");
                    setResponseCypher(cypherValue);
                  }
                  clearPoll();
                  if (modeType !== "query") {
                    await tagProjectNodes();
                    await run(undefined, { silentStatus: true });
                    fetchExistingRules();
                  }
                  setWorkflowStep(5); setProgress(100);
                  setStatus("Workflow completed");
                  finalizeWorkflowStep();
                  setIsRunning(false);
                  return;
                }
                if (status === "cancelled") {
                  setStatus("Workflow cancelled");
                  finalizeWorkflowStep();
                  setIsRunning(false);
                  clearPoll();
                  return;
                }
                if (status === "failed") {
                  setStatus("Workflow failed");
                  setIsRunning(false);
                  clearPoll();
                  return;
                }
                if (status === "unknown") {
                  setStatus("Workflow running...");
                }
              }
            } catch (err) {
              setStatus("Polling failed: " + err.message);
            }
            pollRef.current = setTimeout(poll, 1500);
          };
          clearPoll();
          poll();
        };

        const getNode = (id) => {
          const data = vizRef.current?._data?.nodes;
          if (!data) return null;
          return data.get(id) || data.get(String(id)) || data.get(Number(id));
        };

        const getEdge = (id) => {
          const data = vizRef.current?._data?.edges;
          if (!data) return null;
          return data.get(id) || data.get(String(id)) || data.get(Number(id));
        };

        const fetchNodeProps = async (id) => {
          const cfg = window.GRAPH_CONFIG || {};
          const url = (cfg.neo4jHttp || "/neo4j") + "/db/neo4j/tx/commit";
          const auth = btoa(`${cfg.neo4jUser}:${cfg.neo4jPassword}`);
          const body = {
            statements: [
              {
                statement: "MATCH (n) WHERE id(n) = $id RETURN properties(n) AS props, labels(n) AS labels",
                parameters: { id: Number(id) }
              }
            ]
          };
          const res = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json", "Authorization": "Basic " + auth },
            body: JSON.stringify(body)
          });
          const json = await res.json();
          const row = json?.results?.[0]?.data?.[0]?.row;
          if (!row) return null;
          return { props: normalizeValue(row[0] || {}), labels: row[1] || [] };
        };

        const fetchEdgeProps = async (id) => {
          const cfg = window.GRAPH_CONFIG || {};
          const url = (cfg.neo4jHttp || "/neo4j") + "/db/neo4j/tx/commit";
          const auth = btoa(`${cfg.neo4jUser}:${cfg.neo4jPassword}`);
          const body = {
            statements: [
              {
                statement: "MATCH ()-[r]->() WHERE id(r) = $id RETURN properties(r) AS props, type(r) AS type",
                parameters: { id: Number(id) }
              }
            ]
          };
          const res = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json", "Authorization": "Basic " + auth },
            body: JSON.stringify(body)
          });
          const json = await res.json();
          const row = json?.results?.[0]?.data?.[0]?.row;
          if (!row) return null;
          return { props: normalizeValue(row[0] || {}), type: row[1] || "Relationship" };
        };

        const parseInputValue = (input) => {
          const trimmed = (input || "").trim();
          if (trimmed.length === 0) return "";
          try {
            return JSON.parse(trimmed);
          } catch (_) {
            if (/^-?\d+(\.\d+)?$/.test(trimmed)) return Number(trimmed);
            if (trimmed.toLowerCase() === "true") return true;
            if (trimmed.toLowerCase() === "false") return false;
            return trimmed;
          }
        };

        const updateNodeProp = async (id, key, value) => {
          const cfg = window.GRAPH_CONFIG || {};
          const url = (cfg.neo4jHttp || "/neo4j") + "/db/neo4j/tx/commit";
          const auth = btoa(`${cfg.neo4jUser}:${cfg.neo4jPassword}`);
          const body = {
            statements: [
              {
                statement: "MATCH (n) WHERE id(n) = $id SET n[$key] = $value RETURN properties(n) AS props, labels(n) AS labels",
                parameters: { id: Number(id), key, value }
              }
            ]
          };
          const res = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json", "Authorization": "Basic " + auth },
            body: JSON.stringify(body)
          });
          const json = await res.json();
          const row = json?.results?.[0]?.data?.[0]?.row;
          if (!row) return null;
          return { props: normalizeValue(row[0] || {}), labels: row[1] || [] };
        };

        const deleteNode = async (id) => {
          const cfg = window.GRAPH_CONFIG || {};
          const url = (cfg.neo4jHttp || "/neo4j") + "/db/neo4j/tx/commit";
          const auth = btoa(`${cfg.neo4jUser}:${cfg.neo4jPassword}`);
          const body = {
            statements: [
              { statement: "MATCH (n) WHERE id(n) = $id DETACH DELETE n", parameters: { id: Number(id) } }
            ]
          };
          await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json", "Authorization": "Basic " + auth },
            body: JSON.stringify(body)
          });
        };

        const clearGraph = async (graphName) => {
          const cfg = window.GRAPH_CONFIG || {};
          const url = (cfg.neo4jHttp || "/neo4j") + "/db/neo4j/tx/commit";
          const auth = btoa(`${cfg.neo4jUser}:${cfg.neo4jPassword}`);
          const body = {
            statements: [
              { statement: "MATCH (n {graph: $graph, project: $project}) DETACH DELETE n", parameters: { graph: graphName, project: project || "" } },
              { statement: "MATCH (n) WHERE n.graph IS NULL AND n.project = $project DETACH DELETE n", parameters: { project: project || "" } }
            ]
          };
          await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json", "Authorization": "Basic " + auth },
            body: JSON.stringify(body)
          });
        };

        const bindEvents = () => {
          const viz = vizRef.current;
          if (!viz) return false;
          const net = viz._network || viz.network;
          if (!net) return false;

          net.off("click");
          net.off("oncontext");
          net.on("click", async (params) => {
            setContextMenu(null);
            if (params.nodes && params.nodes.length) {
              const nodeId = params.nodes[0];
              const node = getNode(nodeId);
              let props = extractProps(node);
              let label = node?.label || node?.group || "Node";
              if (Object.keys(props || {}).length === 0) {
                const fetched = await fetchNodeProps(nodeId);
                if (fetched) {
                  props = fetched.props;
                  label = fetched.labels?.[0] || label;
                }
              }
              setSelected(buildDetails("node", label, nodeId, props));
              setEditingKey(null);
              setEditingValue("");
              return;
            }
            if (params.edges && params.edges.length) {
              const edgeId = params.edges[0];
              const edge = getEdge(edgeId);
              let props = extractProps(edge);
              let label = edge?.label || edge?.type || edge?.raw?.type || "Relationship";
              if (Object.keys(props || {}).length === 0) {
                const fetched = await fetchEdgeProps(edgeId);
                if (fetched) {
                  props = fetched.props;
                  label = fetched.type || label;
                }
              }
              setSelected(buildDetails("edge", label, edgeId, props));
              setEditingKey(null);
              setEditingValue("");
              return;
            }
            setSelected(null);
          });

          net.on("oncontext", (params) => {
            params.event.preventDefault();
            if (params.nodes && params.nodes.length) {
              const nodeId = params.nodes[0];
              setContextMenu({ x: params.event.clientX, y: params.event.clientY, nodeId });
            } else {
              setContextMenu(null);
            }
          });

          return true;
        };

        const applyEdgeLabels = () => {
          const rels = vizRef.current?._data?.edges;
          if (!rels) return false;
          rels.forEach((edge, id) => {
            const label = edge.label || edge.type || edge.raw?.type;
            if (label && edge.label !== label) {
              rels.update({ id, label });
            }
          });
          return true;
        };

        const run = (overrideCypher, opts = {}) => {
          const runOptions = opts || {};
          const isEvent = overrideCypher && typeof overrideCypher === "object" && typeof overrideCypher.preventDefault === "function";
          const queryOverride = isEvent ? null : overrideCypher;
          const cfg = window.GRAPH_CONFIG || {};
          if (!cfg.neo4jUri || !cfg.neo4jUser) {
            setStatus("Missing NEO4J config. Check config.js");
            return Promise.resolve(false);
          }
          return new Promise((resolve) => {
            let settled = false;
            const finish = (ok) => {
              if (settled) return;
              settled = true;
              resolve(ok);
            };
            try {
              const query = typeof queryOverride === "string" ? queryOverride : cypher;
              const config = {
                containerId: "viz",
                neo4j: {
                  serverUrl: cfg.neo4jUri,
                  serverUser: cfg.neo4jUser,
                  serverPassword: cfg.neo4jPassword,
                  driverConfig: cfg.driverConfig || {}
                },
                visConfig: {
                  nodes: {
                    shape: "dot",
                    size: 18,
                    font: { color: "#8fd3ff", size: 12, strokeWidth: 0 }
                  },
                  edges: {
                    arrows: { to: { enabled: true } },
                    font: { align: "middle", color: "#9fb6c9", size: 11, strokeWidth: 0, vadjust: -5 },
                    smooth: { type: "dynamic" }
                  },
                  physics: { stabilization: false },
                  groups: cfg.visGroups || {}
                },
                labels: cfg.labels || {},
                relationships: cfg.relationships || {},
                initialCypher: query
              };

              if (vizRef.current) {
                vizRef.current.clearNetwork();
              }
              vizRef.current = new NeoVis.default(config);

              vizRef.current.registerOnEvent("completed", () => {
                applyEdgeLabels();
                bindEvents();
                if (!runOptions.silentStatus) {
                  setStatus("Query executed");
                }
                finish(true);
              });

              vizRef.current.registerOnEvent("error", (e) => {
                try { console.error("NeoVis error", e); } catch (_) {}
                const msg = e?.message || e?.error || (() => { try { return JSON.stringify(e); } catch { return "unknown"; } })();
                if (!runOptions.silentStatus) {
                  setStatus("Neo4j error: " + msg);
                }
                finish(false);
              });

              vizRef.current.render();
            } catch (err) {
              if (!runOptions.silentStatus) {
                setStatus("Error: " + err.message);
              }
              finish(false);
            }
          });
        };

        const sendRules = async () => {
          const cfg = window.GRAPH_CONFIG || {};
          if (!promptText.trim()) {
            setStatus("Prompt is required");
            return;
          }
          if (mode === "edit" && !editRuleId) {
            setStatus("Please select a rule to edit");
            return;
          }
          if (isRunning) return;
          let asyncMode = false;
          setProgress(0);
          setWorkflowStep(0);
          setStepTimes(Array(ingestSteps.length).fill(null));
          setResponseText("");
          setResponseCypher("");
          setStatus(isCypherPrompt ? "Executing cypher..." : "Sending rules...");
          setIsRunning(true);

          try {
            setWorkflowStep(1); setProgress(20);
            if (isCypherPrompt) {
              setResponseCypher(promptText);
              const result = await executeCypher(promptText);
              setWorkflowStep(4); setProgress(85);
              setStatus("Reloading graph...");
              await tagProjectNodes();
              await run(undefined, { silentStatus: true });
              setWorkflowStep(5); setProgress(100);
              setResponseText("Cypher executed successfully");
              setStatus("Workflow completed");
              finalizeWorkflowStep();
              setIsRunning(false);
              return;
            }
            const headers = { "Content-Type": "application/json" };
            if (cfg.n8nUser && cfg.n8nPassword) {
              headers["Authorization"] = "Basic " + btoa(`${cfg.n8nUser}:${cfg.n8nPassword}`);
            }
            const resPromise = fetch(cfg.n8nWebhook || "/n8n/webhook/dg/rules-ingest", {
              method: "POST",
              headers,
              body: JSON.stringify({
                rules_text: mode === "edit" && editRuleId
                  ? "edit Rule_Id: " + editRuleId + " — " + promptText
                  : promptText,
                cypher_prompt: isCypherPrompt,
                project: project || "default-project"
              })
            });
            const res = await resPromise;
            const rawText = await res.text();
            let data = null;
            if (rawText) {
              try { data = JSON.parse(rawText); } catch (_) {}
            }
            if (!res.ok) {
              setStatus("Workflow error: " + (data?.message || rawText || res.status));
              finalizeWorkflowStep();
              return;
            }
            if (data?.status === "accepted" && data?.executionId) {
              asyncMode = true;
              setStatus("Workflow running...");
              startPollingResult(data.executionId, "ingest");
              return;
            }
            if (data?.status === "accepted" && !data?.executionId) {
              asyncMode = true;
              setStatus("Workflow running...");
              startPollingLatest("rules-ingest", "ingest");
              return;
            }
            const isIntermediateResponse = data &&
              !data.answer &&
              !data.response &&
              !data.cypher &&
              (data.rules_text || data.ollama_model || data.neo4j_url);
            if (isIntermediateResponse) {
              asyncMode = true;
              setStatus("Workflow running...");
              startPollingLatest("rules-ingest", "ingest");
              return;
            }
            setWorkflowStep(4); setProgress(80);
            setStatus("Reloading graph...");
            await tagProjectNodes();
            await run(undefined, { silentStatus: true });
            setWorkflowStep(5); setProgress(100);
            setResponseText("The Rule ingesting completed successfully");
            const cypherValue = Array.isArray(data?.cypher)
              ? data.cypher.join("\n\n")
              : (data?.cypher || "");
            setResponseCypher(cypherValue);
            setStatus("Workflow completed");
            finalizeWorkflowStep();
          } catch (err) {
            setStatus((isCypherPrompt ? "Cypher failed: " : "Request failed: ") + err.message);
            finalizeWorkflowStep();
          } finally {
            if (!asyncMode) {
              setIsRunning(false);
            }
          }
        };

        const requestGrammar = async () => {
          const cfg = window.GRAPH_CONFIG || {};
          if (!promptText.trim()) {
            setStatus("Prompt is required");
            return;
          }
          if (isRunning) return;
          let asyncMode = false;
          setProgress(0);
          setWorkflowStep(0);
          setStepTimes(Array(querySteps.length).fill(null));
          setResponseText("");
          setResponseCypher("");
          setStatus(isCypherPrompt ? "Executing cypher..." : "Sending prompt...");
          setIsRunning(true);

          try {
            setWorkflowStep(1); setProgress(20);
            if (isCypherPrompt) {
              setResponseCypher(promptText);
              const result = await executeCypher(promptText);
              setResponseText(formatCypherResult(result));
              setWorkflowStep(5); setProgress(100);
              setStatus("Request completed");
              finalizeWorkflowStep();
              setIsRunning(false);
              return;
            }
            const headers = { "Content-Type": "application/json" };
            if (cfg.n8nUser && cfg.n8nPassword) {
              headers["Authorization"] = "Basic " + btoa(`${cfg.n8nUser}:${cfg.n8nPassword}`);
            }
            const primaryUrl = cfg.n8nQueryWebhook || "/n8n/webhook/dg/graph-query";
            const fallbackUrl = primaryUrl.includes("/webhook/")
              ? primaryUrl.replace("/webhook/", "/webhook-test/")
              : null;
            const callWebhook = async (url) => {
              const res = await fetch(url, {
                method: "POST",
                headers,
                body: JSON.stringify({ prompt: promptText, cypher_prompt: isCypherPrompt, project: project || "default-project" })
              });
              const rawText = await res.text();
              return { res, rawText, url };
            };
            const primaryPromise = callWebhook(primaryUrl);
            let result = await primaryPromise;
            if (
              fallbackUrl &&
              fallbackUrl !== primaryUrl &&
              (result.res.status === 404 || result.res.status === 405 || (result.res.ok && !result.rawText.trim()))
            ) {
              setStatus("Retrying via test webhook...");
              result = await callWebhook(fallbackUrl);
            }
            let data = null;
            if (result.rawText) {
              try { data = JSON.parse(result.rawText); } catch (_) {}
            }
            if (!result.res.ok) {
              const errMsg = data?.message || result.rawText || result.res.status;
              setStatus("Workflow error: " + errMsg);
              setResponseText(`Webhook ${result.url} failed (HTTP ${result.res.status}).\n\n${result.rawText || "No response body"}`);
              finalizeWorkflowStep();
              return;
            }
            if (!result.rawText.trim()) {
              setStatus("Empty response from webhook");
              setResponseText(`Empty response from ${result.url}.\nEnsure the workflow is activated or run in test mode.`);
              finalizeWorkflowStep();
              return;
            }
            if (data?.status === "accepted" && data?.executionId) {
              asyncMode = true;
              setStatus("Workflow running...");
              startPollingResult(data.executionId, "query");
              return;
            }
            if (data?.status === "accepted" && !data?.executionId) {
              asyncMode = true;
              setStatus("Workflow running...");
              startPollingLatest("graph-query", "query");
              return;
            }
            if (typeof data?.message === "string" && data.message.toLowerCase().includes("started")) {
              asyncMode = true;
              setStatus("Workflow running...");
              startPollingLatest("graph-query", "query");
              return;
            }
            const isIntermediateResponse = data &&
              !data.answer &&
              !data.response &&
              !data.cypher &&
              (data.prompt_text || data.ollama_model || data.mcp_url);
            if (isIntermediateResponse) {
              asyncMode = true;
              setStatus("Workflow running...");
              startPollingLatest("graph-query", "query");
              return;
            }
            setWorkflowStep(4); setProgress(85);
            const answer = data?.answer || data?.response || result.rawText || "";
            setResponseText(answer);
            setResponseCypher(data?.cypher || "");
            setWorkflowStep(5); setProgress(100);
            setStatus("Request completed");
            finalizeWorkflowStep();
          } catch (err) {
            setStatus((isCypherPrompt ? "Cypher failed: " : "Request failed: ") + err.message);
            finalizeWorkflowStep();
          } finally {
            if (!asyncMode) {
              setIsRunning(false);
            }
          }
        };

        const handleClearGraph = async () => {
          const graphName = graphView === "MetaGraph" ? "Metagraph" : "OntoGraph";
          if (!confirm(`Delete ALL nodes with graph: ${graphName}?`)) return;
          await clearGraph(graphName);
          run();
        };

        const handleDeleteNode = async (nodeId) => {
          if (!confirm("Delete this node?")) return;
          await deleteNode(nodeId);
          setContextMenu(null);
          setSelected(null);
          run();
        };

        const editProperty = (key) => {
          if (!selected || selected.type !== "node") return;
          const current = selected.props ? selected.props[key] : undefined;
          setEditingKey(key);
          setEditingValue(JSON.stringify(current ?? ""));
        };

        const saveEdit = async () => {
          if (!selected || selected.type !== "node" || !editingKey) return;
          const value = parseInputValue(editingValue);
          const updated = await updateNodeProp(selected.id, editingKey, value);
          if (updated) {
            const label = updated.labels?.[0] || selected.label;
            setSelected(buildDetails("node", label, selected.id, updated.props));
          }
          setEditingKey(null);
          setEditingValue("");
        };

        const addProperty = async () => {
          if (!selected || selected.type !== "node") return;
          const key = prompt("Property name");
          if (!key) return;
          setEditingKey(key);
          setEditingValue("");
        };

        const currentModeLabel = MODE_OPTIONS.find((option) => option.value === mode)?.label || "Select type of Interaction";

        const handleModeChange = (nextMode) => {
          setMode(nextMode);
          setIsModeMenuOpen(false);
        };

        React.useEffect(() => {
          run();
          loadSpeckleConfig();
        }, []);

        const propEntries = selected?.props || {};
        const keySet = new Set(Object.keys(propEntries));
        if (editingKey) keySet.add(editingKey);
        const propKeys = Array.from(keySet).sort();

        const rightPanel = selected
          ? e("div", null,
              e("div", { className: "panel-title" }, "Node details"),
              e("div", { className: "chip" }, selected.label || "Node"),
              e("table", { className: "table" },
                e("thead", null,
                  e("tr", null, e("th", null, "Key"), e("th", null, "Value"))
                ),
                e("tbody", null,
                  e("tr", { key: "<id>" },
                    e("td", null, "<id>"),
                    e("td", { className: "value" }, String(selected.id))
                  ),
                  propKeys.map((k) =>
                    e("tr", { key: k },
                      e("td", null,
                        selected.type === "node" ? e("button", { className: "edit-btn", onClick: () => editProperty(k) }, "\u270E") : null,
                        k
                      ),
                      e("td", { className: "value" },
                        (selected.type === "node" && editingKey === k)
                          ? e("div", { className: "edit-wrap" },
                              e("input", {
                                className: "edit-input",
                                value: editingValue,
                                onChange: (ev) => setEditingValue(ev.target.value),
                                onKeyDown: (ev) => { if (ev.key === "Enter") saveEdit(); }
                              }),
                              e("button", { className: "save-btn", onClick: saveEdit }, "Save")
                            )
                          : JSON.stringify(propEntries[k])
                      )
                    )
                  )
                )
              ),
              selected.type === "node"
                ? e("button", { className: "add-btn", onClick: addProperty }, "Add property")
                : null
            )
          : e("div", { className: "empty" }, "Click a node or edge to see its properties");

        const modeControl = e("div", { className: "mode-dropdown", ref: modeDropdownRef },
          e("button", {
            type: "button",
            className: "mode-trigger",
            "aria-haspopup": "listbox",
            "aria-expanded": isModeMenuOpen,
            onClick: () => setIsModeMenuOpen((open) => !open)
          },
            e("svg", { className: "mode-chevron", viewBox: "0 0 24 24", fill: "none", "aria-hidden": "true" },
              e("path", {
                d: "M6 9L12 15L18 9",
                stroke: "currentColor",
                "stroke-width": "2",
                "stroke-linecap": "round",
                "stroke-linejoin": "round"
              })
            ),
            e("span", { className: "mode-trigger-label" }, currentModeLabel)
          ),
          isModeMenuOpen
            ? e("div", { className: "mode-menu", role: "listbox", "aria-label": "Mode" },
                MODE_OPTIONS.map((option) =>
                  e("button", {
                    key: option.value,
                    type: "button",
                    role: "option",
                    "aria-selected": option.value === mode,
                    className: "mode-item" + (option.value === mode ? " is-selected" : ""),
                    onClick: () => handleModeChange(option.value)
                  }, option.label)
                )
              )
            : null
        );

        return e("div", { className: "graph-viewer-page" },
          e("div", { id: "left" },
            e("div", { className: "gv-nav" },
              e("button", { className: "gv-back-btn", onClick: onBack }, "\u2190 Project"),
              e("span", { className: "gv-project-name" }, project || "")
            ),
            e("h3", null, "Rules"),
            e("label", null, "Mode"),
            modeControl,
            mode === "edit"
              ? e("div", null,
                  e("label", null, "Select Rule to Edit"),
                  loadingRules
                    ? e("div", { className: "hint" }, "Loading rules...")
                    : existingRules.length === 0
                      ? e("div", { className: "hint" }, "No rules found in graph")
                      : e("select", {
                          className: "control-select",
                          value: editRuleId,
                          onChange: (ev) => setEditRuleId(ev.target.value)
                        },
                          e("option", { value: "" }, "Select a rule"),
                          existingRules.map((r) =>
                            e("option", { key: r.rule_id, value: r.rule_id }, r.rule_id)
                          )
                        ),
                  editRuleId
                    ? e("div", { className: "hint", style: { marginTop: "6px", whiteSpace: "pre-wrap", color: "#5fd0ff" } },
                        existingRules.find(r => r.rule_id === editRuleId)?.text || ""
                      )
                    : null,
                  e("button", {
                    style: { width: "auto", marginTop: "8px", background: "transparent", color: "var(--accent)", border: "1px solid var(--accent)", padding: "4px 12px", borderRadius: "6px", cursor: "pointer", fontSize: "12px" },
                    onClick: fetchExistingRules
                  }, "Refresh")
                )
              : null,
            e("label", null, "Graph View"),
            e("select", {
              className: "control-select",
              value: graphView,
              onChange: (ev) => {
                const v = ev.target.value;
                setGraphView(v);
                const q = buildCypher(v);
                setCypher(q);
                run(q);
              }
            },
              e("option", { value: "OntoGraph" }, "OntoGraph"),
              e("option", { value: "MetaGraph" }, "MetaGraph")
            ),
            e("div", { className: "config-card" },
              e("div", { className: "config-title" }, "Model Viewer"),
              e("label", null, "Speckle Project Id or URL"),
              e("input", {
                value: speckleConfig.speckleProjectId,
                placeholder: "Project id or full project URL",
                onChange: (ev) => setSpeckleConfig((current) => ({ ...current, speckleProjectId: ev.target.value }))
              }),
              e("label", null, "Base Model Id or URL"),
              e("input", {
                value: speckleConfig.baseModelId,
                placeholder: "Model id or full model URL",
                onChange: (ev) => setSpeckleConfig((current) => ({ ...current, baseModelId: ev.target.value }))
              }),
              e("label", null, "Base Model Name"),
              e("input", {
                value: speckleConfig.baseModelName,
                placeholder: "Optional display name",
                onChange: (ev) => setSpeckleConfig((current) => ({ ...current, baseModelName: ev.target.value }))
              }),
              e("label", null, "Validation Model Id or URL"),
              e("input", {
                value: speckleConfig.validationModelId,
                placeholder: "Optional id or URL, backend will create if blank",
                onChange: (ev) => setSpeckleConfig((current) => ({ ...current, validationModelId: ev.target.value }))
              }),
              e("button", { onClick: saveSpeckleConfig, disabled: loadingSpeckleConfig }, loadingSpeckleConfig ? "Saving..." : "Save Speckle Link"),
              e("button", { className: "secondary-btn", onClick: openModelViewer }, "Open Model Viewer"),
              e("div", { className: "hint" }, speckleConfigStatus)
            ),
            e("div", null,
              e("div", { className: "prompt-tabs" },
                e("button", {
                  type: "button",
                  className: isCypherPrompt ? "prompt-tab" : "prompt-tab active",
                  onClick: () => setIsCypherPrompt(false)
                }, "Rules Prompt"),
                e("button", {
                  type: "button",
                  className: isCypherPrompt ? "prompt-tab active" : "prompt-tab",
                  onClick: () => setIsCypherPrompt(true)
                }, "Cypher Expression")
              ),
              e("textarea", {
                rows: 6,
                value: promptText,
                className: "prompt-input",
                disabled: mode === "edit" && !editRuleId,
                placeholder: isCypherPrompt
                  ? "Enter Design Rules in Cypher expression here"
                  : mode === "edit"
                    ? (editRuleId ? "Describe the changes to apply to " + editRuleId : "Select a rule above first")
                    : "Enter Design Rules in NL text",
                onChange: (ev) => setPromptText(ev.target.value)
              }),
              mode === "query"
                ? e("button", { onClick: requestGrammar, disabled: isRunning }, "Request Grammar")
                : mode === "edit"
                  ? e("button", { onClick: sendRules, disabled: isRunning || !editRuleId }, "Apply Edit")
                  : e("button", { onClick: sendRules, disabled: isRunning }, "Send Rules")
            ),
            e("button", { className: "danger-btn", onClick: handleClearGraph, disabled: isRunning }, "Clear the Graph"),
            e("div", { className: "progress" },
              e("div", { style: { width: progress + "%" } })
            ),
            e("div", { className: "steps" },
              steps.map((s, i) => {
                const elapsed = stepTimes[i];
                const isActive = i + 1 === step;
                const live = isActive && stepStartedAtRef.current
                  ? roundSeconds(Date.now() - stepStartedAtRef.current)
                  : null;
                const suffix = elapsed !== null && elapsed !== undefined
                  ? ` (${elapsed.toFixed(1)}s)`
                  : (live !== null ? ` (${live.toFixed(1)}s)` : "");
                return e("div", { key: s, className: isActive ? "active" : "" }, s + suffix);
              })
            ),
            e("label", null, "Response"),
            e("textarea", {
              className: "response-output",
              rows: 6,
              value: responseText,
              readOnly: true,
              placeholder: mode === "query" ? "Response will appear here..." : "Workflow response will appear here..."
            }),
            e("div", null,
              e("label", null, "Workflow Cypher"),
              e("textarea", {
                className: "workflow-output",
                rows: 6,
                value: responseCypher,
                readOnly: true,
                placeholder: mode === "query"
                  ? "Cypher used to query the graph will appear here..."
                  : "Cypher used to build the graph will appear here..."
              })
            ),
            mode === "query"
              ? e("div", null,
                  e("label", null, "Cypher Query"),
                  e("textarea", {
                    rows: 8,
                    value: cypher,
                    onChange: (ev) => setCypher(ev.target.value)
                  }),
                  e("button", { onClick: run }, "Run Query")
                )
              : null,
            e("div", { className: "hint" }, "Using ", (window.GRAPH_CONFIG || {}).neo4jUri || "(no uri)"),
            e("div", { className: "status" }, status)
          ),
          e("div", { id: "viz" }),
          e("div", { id: "right", className: selected ? "open" : "" }, rightPanel),
          contextMenu
            ? e("div", { className: "context-menu", style: { left: contextMenu.x, top: contextMenu.y } },
                e("button", { onClick: () => handleDeleteNode(contextMenu.nodeId) }, "Delete")
              )
            : null
        );
      }

      function AppRouter() {
        const [page, setPage] = React.useState("register");
        const [currentUser, setCurrentUser] = React.useState(null);
        const [currentProject, setCurrentProject] = React.useState(null);

        React.useEffect(function() {
          var savedUser = localStorage.getItem("dg_current_user");
          if (savedUser) {
            var users = JSON.parse(localStorage.getItem("dg_users") || "{}");
            if (users[savedUser]) {
              setCurrentUser(savedUser);
              var urlParams = new URLSearchParams(window.location.search);
              var projectParam = urlParams.get("project");
              if (projectParam) {
                var userData = users[savedUser];
                var proj = userData.projects && userData.projects.find(function(p) { return p.name === projectParam; });
                if (proj) {
                  setCurrentProject(projectParam);
                  setPage("project");
                  window.history.replaceState({}, "", window.location.pathname);
                  return;
                }
              }
              setPage("home");
            }
          }
        }, []);

        const handleLogin = function(email) {
          setCurrentUser(email);
          setPage("home");
        };

        const handleLogout = function() {
          localStorage.removeItem("dg_current_user");
          setCurrentUser(null);
          setCurrentProject(null);
          setPage("register");
        };

        const handleSelectProject = function(projectName) {
          setCurrentProject(projectName);
          const users = JSON.parse(localStorage.getItem("dg_users") || "{}");
          const userData = users[currentUser];
          if (userData) {
            const proj = userData.projects.find(function(p) { return p.name === projectName; });
            if (proj) {
              proj.lastEdited = new Date().toISOString();
              localStorage.setItem("dg_users", JSON.stringify(users));
            }
          }
          setPage("project");
        };

        const handleOpenGraphViewer = function() {
          setPage("graph");
        };

        const handleOpenModelViewer = function() {
          var params = new URLSearchParams();
          params.set("project", currentProject || "");
          window.location.href = "/model-viewer/?" + params.toString();
        };

        const handleBackToHome = function() {
          setCurrentProject(null);
          setPage("home");
        };

        const handleBackToProject = function() {
          setPage("project");
        };

        if (page === "register") {
          return e(RegisterPage, { onLogin: handleLogin });
        }
        if (page === "home") {
          return e(HomePage, { user: currentUser, onSelectProject: handleSelectProject, onLogout: handleLogout });
        }
        if (page === "project") {
          return e(ProjectPage, { project: currentProject, user: currentUser, onBack: handleBackToHome, onOpenGraphViewer: handleOpenGraphViewer, onOpenModelViewer: handleOpenModelViewer });
        }
        return e(GraphViewerPage, { key: currentProject, project: currentProject, onLogout: handleLogout, onBack: handleBackToProject });
      }

      const root = ReactDOM.createRoot(document.getElementById("app"));
      root.render(e(AppRouter));
    </script>
  </body>
</html>
